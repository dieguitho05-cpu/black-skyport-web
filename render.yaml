services:
  - type: web
    name: black-skyport
    runtime: static
    buildCommand: npm install && npx vite build --config vite.config.render.ts
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
